<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#6557D4" />
  <meta name="description" content="Toody — Your personal IELTS coach" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Toody" />
  <title>Toody — IELTS Coach</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background: var(--bg);
    }
    .login-shell {
      width: 100%;
      max-width: 390px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px 60px;
      text-align: center;
      gap: 0;
    }
    .login-logo { display: block; margin-bottom: 16px; }
    .login-name {
      font-size: 42px;
      font-weight: 600;
      letter-spacing: -0.05em;
      color: var(--text);
      margin-bottom: 10px;
    }
    .login-name span { color: var(--accent); }
    .login-tagline {
      font-size: 16px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 48px;
      max-width: 260px;
    }
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 24px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-full);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: box-shadow 0.2s, border-color 0.2s;
      margin-bottom: 14px;
    }
    .google-btn:hover { box-shadow: var(--shadow); border-color: var(--accent-mid); }
    .google-icon { width: 20px; height: 20px; }
    .login-note { font-size: 12px; color: var(--muted2); line-height: 1.55; }
    .login-loading {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .login-loading p { font-size: 13px; color: var(--muted); }
    .login-loading.show { display: flex; }
    .google-btn.hide, .login-note.hide { display: none; }
    .login-error {
      display: none;
      font-size: 13px;
      color: var(--danger);
      background: var(--danger-light);
      border: 1.5px solid var(--danger-mid);
      border-radius: var(--r-sm);
      padding: 12px 14px;
      text-align: left;
      width: 100%;
    }
    .login-error.show { display: block; }
  </style>
</head>
<body>
  <div class="login-shell">
    <img class="login-logo" src="icons/toody-logo.png?v=4" alt="Toody" width="80" height="80" />
    <div class="login-name">Too<span>dy</span></div>
    <p class="login-tagline">Your personal IELTS coach. Toody gets you to your target band.</p>

    <button class="google-btn" id="google-btn" onclick="signIn()">
      <svg class="google-icon" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="login-error" id="login-error"></div>
    <div class="login-loading" id="login-loading">
      <div class="spinner"></div>
      <p>Signing you in…</p>
    </div>

    <p class="login-note" id="login-note">
      By continuing you agree to use Toody for your personal IELTS preparation.
    </p>
  </div>

  <script type="module">
    import { auth, googleProvider } from './firebase-config.js';
    import { signInWithPopup, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';

    // If already signed in, go straight to app
    onAuthStateChanged(auth, user => {
      if (user) window.location.href = 'app.html';
    });

    window.signIn = async function () {
      const btn = document.getElementById('google-btn');
      const note = document.getElementById('login-note');
      const loading = document.getElementById('login-loading');
      const error = document.getElementById('login-error');

      btn.classList.add('hide');
      note.classList.add('hide');
      loading.classList.add('show');
      error.classList.remove('show');

      try {
        await signInWithPopup(auth, googleProvider);
        // onAuthStateChanged will redirect to app.html
      } catch (err) {
        btn.classList.remove('hide');
        note.classList.remove('hide');
        loading.classList.remove('show');
        error.textContent = 'Sign-in failed. Please try again.';
        error.classList.add('show');
      }
    };
  </script>
</body>
</html>
